name = "lse-screener"
main = "screener-worker.js"
compatibility_date = "2025-01-01"

# Replace PASTE_KV_ID_HERE with the id printed by:
#   npx wrangler kv namespace create SCREENER
kv_namespaces = [{ binding = "SCREENER", id = "dc167c170fe241be8a9013a63abcee4c" }]

[triggers]
# Incremental refresh: one ticker per tick. Five staggered ticks 2 min apart,
# 18:30–18:38 UTC weekdays (after the LSE close), walk the 5-ticker watchlist in
# one daily pass. Add more ticks here if you grow the watchlist (one per ticker).
crons = [
  "30 18 * * 1-5",
  "32 18 * * 1-5",
  "34 18 * * 1-5",
  "36 18 * * 1-5",
  "38 18 * * 1-5",
]
