name = "lse-screener"
main = "screener-worker.js"
compatibility_date = "2025-01-01"

# Replace PASTE_KV_ID_HERE with the id printed by:
#   npx wrangler kv namespace create SCREENER
kv_namespaces = [{ binding = "SCREENER", id = "dc167c170fe241be8a9013a63abcee4c" }]

[triggers]
# Yahoo has no per-key rate limit, so one cron now refreshes the whole watchlist
# in parallel. 18:30 UTC weekdays — after the LSE close.
crons = ["30 18 * * 1-5"]
